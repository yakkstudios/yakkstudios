<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#FF2E9A"/>
      <stop offset="48%"  stop-color="#FFCC00" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C026FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="100" height="100" fill="#0A0A0F" rx="14"/>

  <!-- Glow layer -->
  <path d="M 50,48 C 46,28 18,22 15,45 C 12,68 46,62 50,48 C 54,34 82,22 85,45 C 88,68 54,62 50,48 Z"
    fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round"
    opacity="0.4" filter="url(#glow)"/>

  <!-- Main stroke -->
  <path d="M 50,48 C 46,28 18,22 15,45 C 12,68 46,62 50,48 C 54,34 82,22 85,45 C 88,68 54,62 50,48 Z"
    fill="none" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>

  <!-- Inner yellow highlight -->
  <path d="M 50,48 C 46,28 18,22 15,45 C 12,68 46,62 50,48 C 54,34 82,22 85,45 C 88,68 54,62 50,48 Z"
    fill="none" stroke="#FFCC00" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- 改善 text -->
  <text x="50" y="90" text-anchor="middle" font-size="14" fill="#FF2E9A"
    font-family="serif" letter-spacing="0.05em" opacity="0.9">改善</text>
</svg>
